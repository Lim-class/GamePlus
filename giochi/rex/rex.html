<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Dino - Record & Logic</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div id="screen">
        <div id="ui-container">
            <div id="score-box">Punti: <span id="current-score">0</span></div>
            <div id="high-score-box">HI: <span id="high-score">0</span></div>
        </div>

        <img src="trex1.png" id="dino" />
        <img src="logo.png" id="logo" /> 
        
        <div id="start-message">Premi SPAZIO per iniziare</div>
        <div id="pause-message" style="display: none;">PAUSA</div>

        <div id="game-over-popup" style="display: none;">
            <h2>GAME OVER</h2>
            <p id="final-score-text"></p>
            <p>Premi SPAZIO per riprovare</p>
        </div>

        <div id="ground"></div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
