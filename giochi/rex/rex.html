<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chrome Dino - Record & Logic</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div id="screen">
        <div id="ui-container">
            <div id="high-score-box">HI: <span id="high-score">00000</span></div>
            <div id="score-box">Punti: <span id="current-score">00000</span></div>
        </div>

        <img src="trex1.png" id="dino" alt="Dino" />
        <img src="logo.png" id="logo" alt="Logo" /> 
        
        <div id="start-message">Premi SPAZIO o Clicca qui per iniziare</div>
        <div id="pause-message" style="display: none;">PAUSA</div>

        <div id="game-over-popup" style="display: none;">
            <h2>GAME OVER</h2>
            <p id="final-score-text"></p>
            <p>Premi SPAZIO o Clicca qui per riprovare</p>
        </div>

        <div id="ground"></div>
    </div>

    <div id="game-controls">
        <button id="btn-jump" class="control-btn">SALTA</button>
        <button id="btn-duck" class="control-btn">GIÙ</button>
        <button id="btn-pause" class="control-btn">PAUSA</button>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
